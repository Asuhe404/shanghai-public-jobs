name: Deploy to GitHub Pages

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      reason:
        description: '部署原因'
        required: false
        default: '手动触发部署'
  
  # 每天08:40（UTC+8）自动运行，配合日报生成时间
  schedule:
    - cron: '40 0 * * *'  # UTC时间00:40，即北京时间08:40
  
  # 当有代码推送到main分支时也触发
  push:
    branches:
      - main
    paths:
      - 'reports/**'
      - 'web/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 生成静态网站
        run: |
          cd web
          python3 generate.py
          echo "网站生成完成"
          
      - name: 配置Git用户
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
      - name: 提交生成的网站文件
        run: |
          cd web/public
          git add -A
          git commit -m "Auto-generated site: $(date +'%Y-%m-%d %H:%M:%S')" || echo "没有更改可提交"
          git push origin main || echo "推送失败或无更改"
          
      - name: 设置Pages
        uses: actions/configure-pages@v4
        
      - name: 上传制品
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/public'
          
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 输出部署状态
        run: |
          echo "部署完成！"
          echo "网站地址: https://${{ github.repository_owner }}.github.io/shanghai-public-jobs/"
          echo "最新日报: https://${{ github.repository_owner }}.github.io/shanghai-public-jobs/latest.html"
          
  # 可选：发送通知到Telegram
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 发送Telegram通知
        run: |
          DEPLOYMENT_STATUS="${{ needs.deploy.result }}"
          REPO_NAME="${{ github.repository }}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/shanghai-public-jobs/"
          
          if [ "$DEPLOYMENT_STATUS" = "success" ]; then
            MESSAGE="✅ 上海公职招聘日报网站部署成功！\n📅 时间: $(date +'%Y-%m-%d %H:%M:%S')\n🔗 访问地址: $PAGES_URL"
          else
            MESSAGE="❌ 上海公职招聘日报网站部署失败！\n📅 时间: $(date +'%Y-%m-%d %H:%M:%S')\n🔍 请查看GitHub Actions日志"
          fi
          
          # 这里需要配置TELEGRAM_BOT_TOKEN和TELEGRAM_CHAT_ID
          # 如果需要Telegram通知，请取消注释以下代码并配置secrets
          # curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          #   -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          #   -d text="$MESSAGE" \
          #   -d parse_mode="Markdown"
          
          echo "$MESSAGE"